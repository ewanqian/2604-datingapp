<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CURATOR</title>
  <style>
    :root{
      --bg:#f4f1eb;
      --card:#fbf9f6;
      --text:#111;
      --muted:#6b665f;
      --line:#d9d1c5;
      --accent:#111;
      --soft:#ece5db;
      --danger:#8f3b2f;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;
      background:linear-gradient(180deg,#f5f1eb 0%,#efe7dc 100%);
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }
    .phone{
      width:100%;
      height:100vh;
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .page{
      position:absolute;
      inset:0;
      padding:18px 18px 90px;
      display:flex;
      flex-direction:column;
      gap:14px;
      opacity:0;
      transform:translateX(28px);
      pointer-events:none;
      transition:all .42s ease;
      overflow:auto;
    }
    .page.active{
      opacity:1;
      transform:translateX(0);
      pointer-events:auto;
    }
    .hidden{display:none !important;}
    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      color:var(--muted);
      letter-spacing:.06em;
      margin-top:4px;
    }
    .app-title{font-size:15px;font-weight:700;letter-spacing:.18em}
    .status-pill{background:var(--soft);padding:6px 12px;border-radius:999px;font-size:11px;color:#403a33}
    h1,h2,h3,p{margin:0}
    
    .profile-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      overflow:hidden;
      flex:1;
      display:flex;
      flex-direction:column;
    }
    .profile-image-wrap{
      width:100%;
      aspect-ratio:4/5;
      background-size:cover;
      background-position:center;
      position:relative;
    }
    .profile-image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .profile-info{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .profile-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
    }
    .profile-header h2{
      font-size:24px;
      font-weight:700;
      letter-spacing:-0.04em;
      line-height:1.1;
    }
    .signal-badge{
      background:var(--accent);
      color:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
    }
    .profile-role{
      font-size:14px;
      color:var(--muted);
      line-height:1.4;
    }
    .profile-bio{
      font-size:14px;
      line-height:1.6;
      color:var(--text);
    }
    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .tag{
      padding:6px 10px;
      border-radius:999px;
      background:var(--soft);
      font-size:12px;
      color:#403a33;
    }
    .upgrade-line{
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
      padding-top:8px;
      border-top:1px solid var(--line);
    }
    
    .action-row{
      display:flex;
      gap:10px;
    }
    .ghost-btn, .primary-btn{
      border:none;
      border-radius:999px;
      padding:14px 18px;
      font-size:15px;
      font-weight:600;
      flex:1;
    }
    .primary-btn{background:var(--accent);color:#fff}
    .ghost-btn{background:transparent;border:1px solid var(--line);color:var(--text)}
    
    .page-header{
      margin-bottom:8px;
    }
    .page-header h2{
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.04em;
      line-height:1.1;
    }
    .matches-list, .conversation-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .match-item, .conversation-item{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      display:flex;
      gap:12px;
      align-items:center;
      cursor:pointer;
      transition:background .2s ease;
    }
    .match-item:hover, .conversation-item:hover{background:#f7f3ed}
    .match-item .avatar, .conversation-item .avatar{
      width:56px;
      height:56px;
      border-radius:16px;
      object-fit:cover;
    }
    .match-copy, .conversation-copy{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .match-top, .conversation-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .match-name, .conversation-name{
      font-size:15px;
      font-weight:600;
    }
    .match-time, .conversation-time{
      font-size:12px;
      color:var(--muted);
    }
    .match-preview, .conversation-preview{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }
    .empty-state{
      text-align:center;
      padding:40px 20px;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }
    
    .chat-view{
      display:flex;
      flex-direction:column;
      height:100%;
    }
    .chat-header{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid var(--line);
      margin-bottom:14px;
    }
    .back-btn{
      background:transparent;
      border:none;
      font-size:15px;
      color:var(--text);
      padding:8px 8px 8px 0;
      cursor:pointer;
    }
    .chat-user{
      display:flex;
      align-items:center;
      gap:10px;
      flex:1;
    }
    .chat-user .avatar{
      width:40px;
      height:40px;
      border-radius:12px;
      object-fit:cover;
    }
    .chat-name{
      font-size:15px;
      font-weight:600;
    }
    .chat-status{
      font-size:12px;
      color:var(--muted);
    }
    .chat-messages{
      flex:1;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-bottom:10px;
    }
    .message-bubble{
      max-width:80%;
      padding:12px 16px;
      border-radius:20px;
      font-size:14px;
      line-height:1.5;
    }
    .message-bubble.sent{
      align-self:flex-end;
      background:var(--accent);
      color:#fff;
      border-bottom-right-radius:4px;
    }
    .message-bubble.received{
      align-self:flex-start;
      background:var(--card);
      border:1px solid var(--line);
      border-bottom-left-radius:4px;
    }
    .message-text{word-break:break-word}
    .reply-options{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding-top:10px;
      border-top:1px solid var(--line);
    }
    .reply-chip{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 16px;
      font-size:13px;
      color:var(--text);
      cursor:pointer;
      transition:all .2s ease;
    }
    .reply-chip:hover{background:var(--soft);border-color:var(--accent)}
    
    .profile-panel{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .metric-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }
    .metric-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      margin-bottom:8px;
    }
    .metric-number{
      font-size:36px;
      font-weight:800;
      letter-spacing:-0.04em;
    }
    .membership-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-top:12px;
    }
    .membership-card h3{
      font-size:18px;
      font-weight:700;
      margin-bottom:8px;
    }
    .membership-card p{
      font-size:14px;
      line-height:1.6;
      color:var(--muted);
      margin-bottom:14px;
    }
    
    .tab-bar{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:var(--bg);
      border-top:1px solid var(--line);
      display:flex;
      padding:12px 18px 20px;
      gap:8px;
      z-index:50;
    }
    .tab{
      flex:1;
      background:transparent;
      border:none;
      padding:12px 8px;
      border-radius:16px;
      font-size:13px;
      font-weight:600;
      color:var(--muted);
      cursor:pointer;
      transition:all .2s ease;
    }
    .tab.active{
      background:var(--accent);
      color:#fff;
    }
    
    .discover-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .tinycaps{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    .badge{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:var(--soft);
      font-size:12px;
      color:#403a33;
      gap:6px;
      align-items:center;
      width:fit-content;
    }
  </style>
</head>
<body>
  <div class="phone">

    <section id="page-discover" class="page active">
      <div class="top-bar">
        <div class="app-title">CURATOR</div>
        <div class="status-pill">Private Beta</div>
      </div>
      
      <div class="discover-top">
        <div>
          <div class="tinycaps">Curated Pool</div>
          <div style="font-size:22px;font-weight:700;letter-spacing:-.04em;margin-top:3px">为你精选的匹配对象</div>
        </div>
        <div class="badge"><span id="discover-index">1 / 18</span></div>
      </div>

      <div class="profile-card">
        <div class="profile-image-wrap">
          <img id="discover-image" src="assets/characters/01_eva_lin.jpg" alt="profile" />
        </div>

        <div class="profile-info">
          <div class="profile-header">
            <h2 id="discover-name">伊娃·林, 34</h2>
            <span id="discover-signal" class="signal-badge">+18</span>
          </div>

          <div id="discover-role" class="profile-role">双年展策展顾问 / 影像项目连接人</div>

          <div id="discover-tags" class="tag-row">
            <span class="tag">双年展</span>
            <span class="tag">评审名单</span>
            <span class="tag">机构入口</span>
          </div>

          <p id="discover-bio" class="profile-bio">
            长期围绕影像、软权力与选择性可见性工作。很擅长让别人觉得自己已经半只脚跨进门里了。
          </p>

          <div id="discover-upgrade" class="upgrade-line">
            潜在提升: 策展晚餐 / 机构靠近感 / 主页身价抬升
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="ghost-btn" onclick="prevDiscoverCard()">‹ 上一个</button>
        <button class="ghost-btn" onclick="nextDiscoverCard()">跳过</button>
        <button class="primary-btn" onclick="connectCurrentCharacter()">连接 ♡</button>
        <button class="ghost-btn" onclick="nextDiscoverCard()">下一个 ›</button>
      </div>
    </section>

    <section id="page-matches" class="page">
      <div class="page-header">
        <h2>配对</h2>
      </div>

      <div id="matches-list" class="matches-list"></div>
    </section>

    <section id="page-inbox" class="page">
      <div id="inbox-view">
        <div class="page-header">
          <h2>消息</h2>
        </div>
        <div id="conversation-list" class="conversation-list"></div>
      </div>

      <div id="chat-view" class="chat-view hidden">
        <div class="chat-header">
          <button class="back-btn" onclick="closeChat()">← 返回</button>
          <div class="chat-user">
            <img id="chat-avatar" class="avatar" src="" alt="" />
            <div>
              <div id="chat-name" class="chat-name">Eva Lin</div>
              <div id="chat-status" class="chat-status">在线</div>
            </div>
          </div>
        </div>

        <div id="chat-messages" class="chat-messages"></div>

        <div id="reply-options" class="reply-options"></div>
      </div>
    </section>

    <section id="page-profile" class="page">
      <div class="page-header">
        <h2>个人</h2>
      </div>

      <div class="profile-panel">
        <div class="metric-card">
          <div class="metric-label">Signal Value</div>
          <div class="metric-number">84</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Institutional Reach</div>
          <div class="metric-number">High</div>
        </div>

        <div class="metric-card">
          <div class="metric-label">Current Tier</div>
          <div class="metric-number">Private Beta</div>
        </div>
      </div>

      <div class="membership-card">
        <h3>会员</h3>
        <p>扩大可见性、优先介绍、高级筛选和私密开幕式。</p>
        <button class="primary-btn">管理</button>
      </div>
    </section>

    <nav class="tab-bar">
      <button class="tab active" data-page="discover" onclick="switchPage('discover')">发现</button>
      <button class="tab" data-page="matches" onclick="switchPage('matches')">配对</button>
      <button class="tab" data-page="inbox" onclick="switchPage('inbox')">消息</button>
      <button class="tab" data-page="profile" onclick="switchPage('profile')">个人</button>
    </nav>

  </div>

<script src="data/characters.js"></script>
<script src="data/archetypes.js"></script>
<script src="data/message_templates.js"></script>
<script src="data/storylines.js"></script>
<script src="data/system_config.js"></script>
<script src="data/fake_notifications.js"></script>
<script src="app.js"></script>
<script>
if (typeof characters !== 'undefined' && characters.length > 0) {
  setTimeout(function() {
    renderDiscoverCard(characters[0]);
    switchPage('discover');
  }, 100);
}
</script>
</body>
</html>
